class: aimttention.models.aimnet2.AIMNet2
kwargs:
    nfeature: 16
    d2features: true
    hidden:
      - [512, 380]
      - [512, 380]
      - [512, 380, 380]
    aim_size: 256
    attention_heads: 8
    num_charge_channels: 2
    attention_dropout: 0.0
    n_angular_basis: 8
    use_dihedral: true
    aev:
      rc_s: 5.0
      nshifts_s: 16
    outputs:
      energy_mlp:
        class: aimttention.modules.Output
        kwargs:
          n_in: 256
          n_out: 1
          key_in: 'aim'
          key_out: 'energy'
          mlp:
            activation_fn: torch.nn.GELU
            last_linear: true
            hidden: [128, 128]

      atomic_shift:
        class: aimttention.modules.AtomicShift
        kwargs:
          key_in: 'energy'
          key_out: 'energy'

      atomic_sum:
        class: aimttention.modules.AtomicSum
        kwargs:
          key_in: 'energy'
          key_out: 'energy'

      lrcoulomb:
        class: aimttention.modules.LRCoulomb
        kwargs:
          key_in: 'charges'
          key_out: 'energy'
